[package]
  url = "https://ftp.gnu.org/gnu/ncurses/ncurses-6.5.tar.gz"
  ref = "6.5"

[[build_configs]]
  system_name = "linux"
  build_system = "makefiles"
  build_shared_option = "--with-shared"
  build_static_option = "--with-static"
  options = [
    "--host=${HOST}",
    "--disable-stripping",
    "--with-termlib",
  ]

# Note:
# This library support linux only.

[package]
url = "https://github.com/itstool/itstool.git"
ref = "2.0.7"
depth = 1

[[build_configs]]
system_name = "linux"
build_system = "makefiles"
build_tools = ["apt:python3-libxml2"]
dev_dependencies = ["macros@1.20.2"]
envs = ["NOCONFIGURE=1"]
pre_configure = [
    "./autogen.sh",
    "sed -i '1a export PYTHONPATH=/usr/lib/python3/dist-packages:$PYTHONPATH' configure"
]
[package]
  url = "https://github.com/unicode-org/icu.git"
  ref = "release-75-1"
  src_dir = "icu4c/source"
  depth = 1

# ============= build for aarch64-linux ============ #
[[build_configs]]
  system_name = "linux"
  system_processor = "aarch64"
  build_system = "makefiles"
  options = [
    "--host=${HOST}",
    "--with-cross-build=${BUILD_DIR}/../x86_64-linux-dev",
  ]
  envs = ["LDFLAGS=-L${BUILD_DIR}/lib -L${BUILD_DIR}/stubdata -Wl,-rpath-link,${BUILD_DIR}/lib -Wl,-rpath-link,${BUILD_DIR}/stubdata"]
  dev_dependencies = ["icu@75.1"]

# ============= build for x86_64-linux ============= #
[[build_configs]]
  system_name = "linux"
  system_processor = "x86_64"
  build_system = "makefiles"
  disable_dev_cache = true
  options = ["--host=${HOST}"]

# ============= build for windows ================== #
[[build_configs]]
  system_name = "windows"
  system_processor = "x86_64"
  build_system = "makefiles"
  cxx_standard = "c++17"
  build_tools = ["python3"]

# Note:
# This library support linux only.

[package]
  url = "https://ftp.gnu.org/gnu/automake/automake-1.18.tar.xz"
  ref = "1.18"
  build_tool = true

[[build_configs]]
  system_name = "linux"
  build_system = "makefiles"
  dependencies = ["autoconf@2.72"]
  options = ["--disable-nls"]
  envs = [
    "AUTOCONF=:",   # Avoid regenerating configure.ac
    "AUTOMAKE=:",   # Avoid regenerating Makefile.in
    "ACLOCAL=:",    # Avoid regenerating aclocal.m4
    "AUTOHEADER=:", # Avoid regenerating config.h.in
    "MAKEINFO=:",   # Avoid regenerating *.info
  ]

[package]
  url = "https://github.com/openssl/openssl.git"
  ref = "OpenSSL_1_1_1w"
  depth = 1
  ignore_submodule = true

# ============== build for aarch64-linux ============== #
[[build_configs]]
  system_name = "linux"
  system_processor = "aarch64"
  build_system = "makefiles"
  build_shared = "shared"
  build_static = "_"
  options = [
    "linux-aarch64",
    "no-tests",
    "--libdir=lib",
  ]

# ============== build for x86_64-linux ============== #
[[build_configs]]
  system_name = "linux"
  system_processor = "x86_64"
  build_system = "makefiles"
  build_shared = "shared"
  build_static = "_"
  options = [
    "linux-x86_64",
    "no-tests",
    "--libdir=lib",
  ]

# ============== build for windows ============== #
[[build_configs]]
  system_name = "windows"
  build_system = "makefiles"
  build_shared = "shared"
  build_static = "_"
  options = [
    "VC-WIN64A",
    "no-tests",
    "--openssldir=ssl",
    "--libdir=lib",
  ]

# ============== build for QNX ============== #
[[build_configs]]
  system_name = "qnx"
  build_system = "makefiles"
  build_shared = "shared"
  build_static = "_"
  envs = [
    "CC=ntoaarch64-gcc",
    "CXX=ntoaarch64-g++",
  ]
  post_configure = [
    "sed -i 's|CNF_EX_LIBS=-ldl -pthread|CNF_EX_LIBS=-lsocket -pthread|' ${BUILD_DIR}/Makefile",
  ]
  options = [
    "linux-aarch64",
    "no-tests",
    "no-afalgeng",
    "no-dso",
    "--openssldir=ssl",
    "--libdir=lib",
  ]

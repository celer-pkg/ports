[package]
  url = "https://github.com/flann-lib/flann.git"
  ref = "1.9.2"
  depth = 1

[[build_configs]]
  build_system = "cmake"
  dev_dependencies = ["pkgconf@2.4.3"]
  dependencies = ["lz4@1.9.4"]
  options = [
    "-DBUILD_DOC=OFF",
    "-DBUILD_EXAMPLES=OFF",
    "-DBUILD_TESTS=OFF",
    "-DBUILD_MATLAB_BINDINGS=OFF",
    "-DBUILD_PYTHON_BINDINGS=OFF"
  ]

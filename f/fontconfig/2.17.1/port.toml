[package]
  url = "https://gitlab.freedesktop.org/fontconfig/fontconfig.git"
  ref = "2.17.1"
  depth = 1

[[build_configs]]
  system_names = ["linux", "android"]
  build_system = "makefiles"
  include_dirs = [
    "${DEPS_DIR}/include/freetype2",
    "${DEPS_DIR}/include/json-c",
  ]
  envs = ["NOCONFIGURE=1"]
  patches = ["remove-test-from-SUBDIRS.patch"]
  dependencies = [
    "freetype@2.13.3",
    "libexpat@2.7.1",
    "libpng@1.6.49",
    "json-c@0.18",
  ]
  dev_dependencies = [
    "macros@1.20.2",
    "libtool@2.5.4",
    "gettext@0.25",
    "gperf@3.1",
  ]
  pre_configure = ["./autogen.sh"]
  options = ["--host=${HOST}"]

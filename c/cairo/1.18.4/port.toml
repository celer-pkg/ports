[package]
url = "https://gitlab.freedesktop.org/cairo/cairo.git"
ref = "1.18.4"
depth = 1

[[build_configs]]
system_name = "linux"
build_system = "meson"
dev_dependencies = [
  "libtool@2.5.4",
  "macros@1.20.2",
  "pkgconf@2.4.3",
]
dependencies = [
  "libexpat@2.7.1",
  "fontconfig@2.17.1",
  "freetype@2.13.3",
  "glib@2.84.1",
  "libpng@1.6.49",
  "gperf@3.1",
  "pixman@0.44.2",
  "zlib@1.3.1",
  "libx11@1.8.11",
]
options = [
  "--wrap-mode=nofallback",
  "-Dxlib=enabled",
]

[package]
  url = "https://gitlab.freedesktop.org/cairo/cairo.git"
  ref = "1.18.4"
  depth = 1

[[build_configs]]
  system_name = "linux"
  build_system = "meson"
  dev_dependencies = ["libtool@2.5.4", "macros@1.20.2", "pkgconf@2.4.3"]
  dependencies = [
    "libexpat@2.7.1",
    "libx11@1.8.11",
    "libxext@1.3.6",
    "libxrender@0.9.12",
    "pixman@0.44.2",
    "fontconfig@2.16.0",
  ]
  options = ["-Dxlib=enabled"]

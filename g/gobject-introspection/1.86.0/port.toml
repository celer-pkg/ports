[package]
  url = "https://gitlab.gnome.org/GNOME/gobject-introspection.git"
  ref = "1.86.0"
  depth = 1

[[build_configs]]
  system_name = "linux"
  build_system = "meson"
  dev_dependencies = [
    "cpython@3.11.13",
    "flex@2.6.4",
    "bison@3.8.2",
    "gettext@0.25",
  ]
  dependencies = ["glib@2.84.1", "libiconv@1.18"]
  options = [
    "--wrap-mode=nofallback",
    "-Dpython=${DEPS_DEV_DIR}/bin/python3",
    "-Dbuild_introspection_data=false"
  ]

[package]
  url = "https://github.com/p11-glue/p11-kit.git"
  ref = "0.25.5"
  depth = 1

[[build_configs]]
  system_name = "linux"
  build_system = "makefiles"
  dependencies = ["libffi@3.4.8"]
  dev_dependencies = ["pkgconf@2.4.3", "macros@1.20.2", "gettext@0.25"]
  envs = ["NOCONFIGURE=1"]
  pre_configure = ["./autogen.sh"]
  options = [
    "--host=${HOST}",
    "--without-libtasn1",
  ]

# Note:
# This library support linux only.

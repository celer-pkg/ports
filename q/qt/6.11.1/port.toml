[package]
  url = "https://download.qt.io/archive/qt/6.11/6.11.1/single/qt-everywhere-src-6.11.1.tar.xz"
  ref = "6.11.1"

[[build_configs]]
  system_name = "linux"
  system_processor = "x86_64"
  build_system = "cmake"
  cmake_generator = "Ninja"
  build_tools = ["llvm"]
  dependencies = [
    "libxcb-cursor@0.1.6",
    "xcb-util-wm@0.4.2",
    "xcb-imdkit@1.0.8",
    "xcb-util-xrm@1.0",
    "mesa@23.3.6",
    "icu@75.1",
    "libjpeg@9f",
    "freetype@2.13.3",
    "libsm@1.2.5",
    "xorg-sgml-doctools@1.12.1",
    "libxkbcommon@1.6.0",
    "pthread-stubs@0.4",
    "libxcb-image@0.1.5",
    "xcb-util-renderutil@0.3.10",
    "xcb-util@0.4.1",
    "libxdmcp@1.1.5",
    "libxext@1.3.6",
    "libxfixes@6.0.1",
    "libxi@1.8.2",
    "libxrender@0.9.12",
    "libxtrans@1.5.2",
    "xorgproto@2024.1",
    "libdrm@2.4.124",
    "libxslt@1.1.42",
    "libxcursor@1.2.3",
    "libxcomposite@0.4.6",
    "libxdamage@1.1.6",
    "libxrandr@1.5.4",
    "libxscrnsaver@1.2.4",
    "libevent@2.1.12",
    "nss@3.55",
    "fontconfig@2.17.1",
    "pulseaudio@16.2",
    "zstd@1.5.7",
    "pcre2@10.44",
  ]
  options = [
    "-DBUILD_WRAP_PROTOC=ON",
    "-DBUILD_PROTOBUF_TOOLS=ON",
    "-DQT_BUILD_Core=ON",
    "-DQT_BUILD_Network=ON",
    "-DQT_BUILD_Widgets=ON",
    "-DQT_BUILD_Gui=ON",
    "-DQT_BUILD_Qml=ON",
    "-DQT_BUILD_WebChannel=ON",
    "-DQT_BUILD_WebEngineCore=ON",
    "-DQT_BUILD_WebView=ON",
    "-DQT_BUILD_WebEngineWidgets=ON",
    "-DQT_BUILD_Quick=ON",
    "-DQT_BUILD_QuickWidgets=ON", 
    "-DQT_BUILD_QTDECLARATIVE=OFF",   
    "-DQT_BUILD_EXAMPLES=OFF", 
    "-DQT_BUILD_TESTS=OFF",
    "-DQT_NO_FEATURE_AUTO_RESET=ON",
    "-DQT_NO_PACKAGE_VERSION_CHECK=TRUE",
    "-DQT_NO_PACKAGE_VERSION_INCOMPATIBLE_WARNING=TRUE",
    "-DQT_DEBUG_FIND_PACKAGE=ON",
    "-DQT_BUILD_Wayland=ON",
  ]

